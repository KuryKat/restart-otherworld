name: Test Countdown + Restart + README

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  restart:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compute expected restart time
        run: |
          NOW=$(date -u +%s)
          ALIGNED=$(( ( (NOW + 10800) / 21600 ) * 21600 ))
          echo "EXPECTED_RESTART=$(date -u -d "@$ALIGNED" '+%Y-%m-%d %H:%M UTC')" >> "$GITHUB_ENV"
          echo "EXPECTED_EPOCH=$ALIGNED" >> "$GITHUB_ENV"

      - name: Countdown
        run: |
          PANEL="${{ secrets.PTERODACTYL_PANEL_URL }}"
          SERVER="${{ secrets.PTERODACTYL_SERVER_ID }}"
          KEY="${{ secrets.PTERODACTYL_API_KEY }}"

          send() {
            BODY=$(jq -n --arg cmd "$1" '{command: $cmd}')
            curl -sf -X POST "$PANEL/api/client/servers/$SERVER/command" \
              -H "Authorization: Bearer $KEY" -H "Content-Type: application/json" \
              -H "Accept: Application/vnd.pterodactyl.v1+json" -d "$BODY"
          }

          send 'tellraw @a [{"text":"[Server] ","color":"dark_red","bold":true},{"text":"Server restarting in ","color":"red"},{"text":"3...","color":"red","bold":true}]'
          send 'title @a times 5 15 5'
          send 'title @a subtitle {"text":"in 3 seconds","color":"yellow","bold":true}'
          send 'title @a title {"text":"RESTARTING","color":"red","bold":true}'
          sleep 1

          send 'tellraw @a [{"text":"[Server] ","color":"dark_red","bold":true},{"text":"Server restarting in ","color":"red"},{"text":"2...","color":"red","bold":true}]'
          send 'title @a subtitle {"text":"in 2 seconds","color":"yellow","bold":true}'
          send 'title @a title {"text":"RESTARTING","color":"red","bold":true}'
          sleep 1

          send 'tellraw @a [{"text":"[Server] ","color":"dark_red","bold":true},{"text":"Server restarting in ","color":"red"},{"text":"1...","color":"red","bold":true}]'
          send 'title @a subtitle {"text":">> NOW <<","color":"red","bold":true}'
          send 'title @a title {"text":"RESTARTING","color":"dark_red","bold":true}'
          sleep 1

      - name: Restart Pterodactyl Server
        run: |
          curl -sf -X POST "${{ secrets.PTERODACTYL_PANEL_URL }}/api/client/servers/${{ secrets.PTERODACTYL_SERVER_ID }}/power" \
            -H "Authorization: Bearer ${{ secrets.PTERODACTYL_API_KEY }}" \
            -H "Content-Type: application/json" \
            -H "Accept: Application/vnd.pterodactyl.v1+json" \
            -d '{"signal": "restart"}'
          echo "ACTUAL_RESTART=$(date -u '+%Y-%m-%d %H:%M UTC')" >> "$GITHUB_ENV"
          echo "ACTUAL_EPOCH=$(date -u +%s)" >> "$GITHUB_ENV"

      - name: Update README timestamps
        run: |
          DRIFT_MIN=$(( (ACTUAL_EPOCH - EXPECTED_EPOCH) / 60 ))
          if [ "$DRIFT_MIN" -ge 0 ]; then DRIFT="+${DRIFT_MIN}m"; else DRIFT="${DRIFT_MIN}m"; fi

          sed -i "s|_Expected last restart:.*|_Expected last restart: ${EXPECTED_RESTART}_ (manually triggered test run, not real numbers)|" README.md
          sed -i "s|_Actual last restart:.*|_Actual last restart: ${ACTUAL_RESTART} (drift: ${DRIFT})_ (manually triggered test run, not real numbers)|" README.md

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "Update restart timestamps (test run)" || echo "Nothing to commit"
          git push
